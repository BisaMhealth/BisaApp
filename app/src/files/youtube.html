<!DOCTYPE html>
<html>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <body>
    <!-- 1. The <iframe> (and video player) will replace this <div> tag. -->
    <div id="player"></div>
    <script src="./nativescript-webview-interface.js"></script>
    <script>
      console.log("Webview has been loaded!");
      
      // 2. This code loads the IFrame Player API code asynchronously.
      var tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      var firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);


      window.ytPlayerList = [];
      window.players = [];

      var playerTag = document.getElementById('player');
      var oWebViewInterface = window.nsWebViewInterface;

      function onYouTubeIframeAPIReady() {
        console.log("The youtube iframe api is ready!!!")
        oWebViewInterface.on('show-videos', async function (eventData) {
          console.log("Show Videos event: " + eventData.length)
          var videos = eventData;

          await videos.forEach(function (video, index) {
            console.log("Loading one video: " + video.video_url)
            var playerTagId = "player_" + index
            var divTag = document.createElement('div');
            divTag.setAttribute('id', playerTagId);
            playerTag.appendChild(divTag);

            // 3. This function creates an <iframe> (and YouTube player)
            //    after the API code downloads.
            var player;
            var videoId = String(video.video_url).replace("https://www.youtube.com/watch?v=", "")
            console.log("Video ID: " + videoId)
            player = new YT.Player(playerTagId, {
              videoId: videoId,
              width: '100%',
              events: {
                'onReady': onPlayerReady
                // 'onStateChange': onPlayerStateChange
              },
              playerVars: {
                'autoplay': 0,
                'origin': window.location.origin
              }
            });
    
            window[playerTagId] = player;
          });
          
          oWebViewInterface.emit('videos-loaded', { loaded: true });
        });
      }

      // 4. The API will call this function when the video player is ready.
      function onPlayerReady(event) {
        console.log("Player is ready")
        event.target.playVideo();
      }

      // 5. The API calls this function when the player's state changes.
      //    The function indicates that when playing a video (state=1),
      //    the player should play for six seconds and then stop.
      var done = false;
      function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING && !done) {
          setTimeout(stopVideo, 6000);
          done = true;
        }
      }
      function stopVideo() {
        if (window["player_0"]) {
          window["player_0"].stopVideo();
        }
      }

    </script>
  </body>
</html>
